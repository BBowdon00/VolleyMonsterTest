name: Preview

on:
  push:
    branches: [preview]

concurrency:
  group: preview
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  ci:
    uses: ./.github/workflows/_ci-checks.yml
    with:
      stripe_key: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY_PREVIEW || 'pk_test_placeholder' }}

  build-and-push:
    name: Build & push preview images
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/volleymonster-api:preview
          build-args: |
            VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY_PREVIEW }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.web
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/volleymonster-web:preview
          build-args: |
            TAG=preview
            GHCR_OWNER=${{ env.IMAGE_OWNER }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy preview
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy preview compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: deploy/docker-compose.preview.yml
          target: /opt/volleymonster

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/volleymonster
            export GHCR_OWNER=${{ env.IMAGE_OWNER }}
            docker compose -f deploy/docker-compose.preview.yml --env-file .env.preview pull
            docker compose -f deploy/docker-compose.preview.yml --env-file .env.preview up -d
            docker image prune -f
            for i in $(seq 1 12); do
              status=$(docker inspect "$(docker compose -f deploy/docker-compose.preview.yml --env-file .env.preview ps -q api)" --format='{{.State.Health.Status}}' 2>/dev/null || echo "error")
              [ "$status" = "healthy" ] && break
              [ $i -eq 12 ] && { echo "Preview API unhealthy after 60s: $status"; docker compose -f deploy/docker-compose.preview.yml --env-file .env.preview logs api --tail 30; exit 1; }
              sleep 5
            done

  e2e:
    name: E2E smoke tests
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: https://preview.volleymonster.com
