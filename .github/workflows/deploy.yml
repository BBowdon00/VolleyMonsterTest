name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [master]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Compute short SHA and lowercase owner
        id: meta
        run: |
          sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "tag=${sha:0:12}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_OWNER=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/volleymonster-api:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/volleymonster-api:latest
          # These are Vite frontend vars consumed during the SPA build inside
          # Dockerfile.api. The dist folder is later extracted by Dockerfile.nginx.
          build-args: |
            VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/volleymonster-web:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/volleymonster-web:latest
          build-args: |
            TAG=${{ steps.meta.outputs.tag }}
            GHCR_OWNER=${{ env.IMAGE_OWNER }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to droplet
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: deploy/docker-compose.yml
          target: /opt/volleymonster/prod
          strip_components: 1
          overwrite: true

      - name: Verify SSH secrets are non-empty
        run: |
          echo "DROPLET_HOST length: ${#H}"
          echo "DROPLET_USER length: ${#U}"
          echo "DROPLET_SSH_KEY length: ${#K}"
          [ -n "$H" ] && [ -n "$U" ] && [ -n "$K" ] || { echo "One or more SSH secrets are empty"; exit 1; }
        env:
          H: ${{ secrets.DROPLET_HOST }}
          U: ${{ secrets.DROPLET_USER }}
          K: ${{ secrets.DROPLET_SSH_KEY }}

      - name: SSH and pull/up
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: TAG
          script: |
            set -euo pipefail
            cd /opt/volleymonster/prod
            export TAG=${{ needs.build-and-push.outputs.tag }}
            export GHCR_OWNER=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')
            docker network inspect traefik-public >/dev/null 2>&1 || docker network create traefik-public
            docker compose pull
            docker compose up -d
            docker image prune -f
            for i in $(seq 1 12); do
              status=$(docker inspect "$(docker compose ps -q api)" --format='{{.State.Health.Status}}' 2>/dev/null || echo "error")
              [ "$status" = "healthy" ] && break
              [ $i -eq 12 ] && { echo "API unhealthy after 60s: $status"; docker compose logs api --tail 30; exit 1; }
              sleep 5
            done
