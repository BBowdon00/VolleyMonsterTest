name: volleymonster

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: volleymonster
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: volleymonster
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U volleymonster -d volleymonster']
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER is required}/volleymonster-api:${TAG:-latest}
    restart: 'no'
    command: ['tsx', 'api/migrate.ts']
    environment:
      DATABASE_URL: postgres://volleymonster:${POSTGRES_PASSWORD}@postgres:5432/volleymonster
      NODE_ENV: production
    networks:
      - default
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: ghcr.io/${GHCR_OWNER}/volleymonster-api:${TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://volleymonster:${POSTGRES_PASSWORD}@postgres:5432/volleymonster
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY is required}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?STRIPE_WEBHOOK_SECRET is required}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY is required}
      EMAIL_FROM: ${EMAIL_FROM:?EMAIL_FROM is required}
      PUBLIC_SITE_URL: https://${DOMAIN}
      ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN is required}
      NODE_ENV: production
      PORT: '3000'
    networks:
      - default
      - traefik-public
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=traefik-public'
      - 'traefik.http.routers.api.rule=Host(`${DOMAIN:?DOMAIN is required}`) && PathPrefix(`/api`)'
      - 'traefik.http.routers.api.entrypoints=websecure'
      - 'traefik.http.routers.api.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.api.middlewares=security-headers'
      - 'traefik.http.routers.api.service=api-svc'
      - 'traefik.http.routers.checkout.rule=Host(`${DOMAIN}`) && Path(`/api/create-checkout-session`)'
      - 'traefik.http.routers.checkout.entrypoints=websecure'
      - 'traefik.http.routers.checkout.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.checkout.middlewares=security-headers,checkout-ratelimit'
      - 'traefik.http.routers.checkout.service=api-svc'
      - 'traefik.http.services.api-svc.loadbalancer.server.port=3000'
      - 'traefik.http.middlewares.checkout-ratelimit.ratelimit.average=10'
      - 'traefik.http.middlewares.checkout-ratelimit.ratelimit.period=1m'
      - 'traefik.http.middlewares.checkout-ratelimit.ratelimit.burst=5'
      - 'traefik.http.middlewares.security-headers.headers.stsSeconds=31536000'
      - 'traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true'
      - 'traefik.http.middlewares.security-headers.headers.frameDeny=true'
      - 'traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true'
      - 'traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin'
      - "traefik.http.middlewares.security-headers.headers.contentSecurityPolicy=default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; frame-src https://js.stripe.com; connect-src 'self' https://api.stripe.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'"

  web:
    image: ghcr.io/${GHCR_OWNER}/volleymonster-web:${TAG:-latest}
    restart: unless-stopped
    networks:
      - traefik-public
    depends_on:
      - api
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=traefik-public'
      - 'traefik.http.routers.web.rule=Host(`${DOMAIN}`)'
      - 'traefik.http.routers.web.entrypoints=websecure'
      - 'traefik.http.routers.web.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.web.middlewares=security-headers'
      - 'traefik.http.routers.web.service=web-svc'
      - 'traefik.http.services.web-svc.loadbalancer.server.port=80'
      - 'traefik.http.middlewares.security-headers.headers.stsSeconds=31536000'
      - 'traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true'
      - 'traefik.http.middlewares.security-headers.headers.frameDeny=true'
      - 'traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true'
      - 'traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin'
      - "traefik.http.middlewares.security-headers.headers.contentSecurityPolicy=default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; frame-src https://js.stripe.com; connect-src 'self' https://api.stripe.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'"

  traefik:
    image: traefik:v3
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.41
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - default
      - traefik-public
    command:
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--providers.docker.network=traefik-public'
      - '--entrypoints.web.address=:80'
      - '--entrypoints.web.http.redirections.entrypoint.to=websecure'
      - '--entrypoints.web.http.redirections.entrypoint.scheme=https'
      - '--entrypoints.web.http.redirections.entrypoint.permanent=true'
      - '--entrypoints.websecure.address=:443'
      - '--certificatesresolvers.letsencrypt.acme.httpchallenge=true'
      - '--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web'
      - '--certificatesresolvers.letsencrypt.acme.email=${LE_EMAIL:?LE_EMAIL is required}'
      - '--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json'
      - '--accesslog=true'

volumes:
  pgdata:
  letsencrypt:

# `traefik-public` is the shared external network that lets traefik route to
# the preview stack (which runs as a separate compose project). Postgres is
# deliberately NOT on this network — only services that need a public route.
#
# One-time setup on the VPS, before `docker compose up`:
#   docker network create traefik-public
networks:
  default:
  traefik-public:
    external: true
