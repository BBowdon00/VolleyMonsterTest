name: volleymonster-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: volleymonster
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: volleymonster
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U volleymonster -d volleymonster']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata-dev:
