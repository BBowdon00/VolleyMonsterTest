# Strict transport: tell browsers to only ever use HTTPS for 1y on this domain.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Clickjacking + MIME-sniffing protections (mirrors prior netlify.toml headers)
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# CSP — Stripe Checkout is a hosted redirect (no inline form), but their SDK
# loads via js.stripe.com and posts to api.stripe.com.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; frame-src https://js.stripe.com; connect-src 'self' https://api.stripe.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'" always;
