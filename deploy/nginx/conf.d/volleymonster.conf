# Rate-limit zone for the checkout endpoint (replaces edge-functions/rate-limit.ts).
limit_req_zone $binary_remote_addr zone=checkout:10m rate=10r/m;

# ─── :80 — ACME challenge + redirect to HTTPS ─────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name volleymonster.com www.volleymonster.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://volleymonster.com$request_uri;
    }
}

# ─── :443 www.* → apex ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name www.volleymonster.com;

    ssl_certificate     /etc/letsencrypt/live/volleymonster.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/volleymonster.com/privkey.pem;

    return 301 https://volleymonster.com$request_uri;
}

# ─── :443 apex ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name volleymonster.com;

    ssl_certificate     /etc/letsencrypt/live/volleymonster.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/volleymonster.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    include /etc/nginx/snippets/security.conf;

    client_max_body_size 1m;

    # ─── API routes ───────────────────────────────────────────────────────────

    # Stripe webhook — preserve raw body for HMAC verification, no buffering.
    location = /api/stripe-webhook {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Rate-limited checkout endpoint.
    location = /api/create-checkout-session {
        limit_req zone=checkout burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Generic /api proxy.
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # send-confirmation-email-background was 15min on Netlify; allow comparable headroom.
        proxy_read_timeout 900s;
    }

    # ─── Static SPA ───────────────────────────────────────────────────────────

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed Vite assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — replaces 13 explicit netlify.toml redirects with one rule.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
