[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "vite"
  targetPort = 5173
  autoLaunch = false

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback — explicit per-route entries so Vite's module paths
# (/src/*, /@vite/*, /@react-refresh, etc.) don't match in dev.
[[redirects]]
  from = "/tournaments"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/tournaments/*"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/registration/*"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/manage/*"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/about"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/rules"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/dev/*"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/season-pass"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/season-pass/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; frame-src https://js.stripe.com; connect-src 'self' https://api.stripe.com; img-src 'self' data: https://zjqoyxxjadqkfzymktgd.supabase.co; style-src 'self' 'unsafe-inline'"

[images]
  remote_images = ["https://zjqoyxxjadqkfzymktgd\\.supabase\\.co/.*"]

# ── Deploy contexts ───────────────────────────────────────────────────────────
# Production: real Stripe, real DB. Secrets set in Netlify dashboard only.
[context.production.environment]
  PUBLIC_SITE_URL = "https://volleymonster.com"

[context.deploy-preview.environment]
  PUBLIC_SITE_URL = "https://deploy-preview-$DEPLOY_ID--volleymonster.netlify.app"
